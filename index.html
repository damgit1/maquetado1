<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e5e5e5;
      font-family: Arial, sans-serif;
    }

    .login {
      background: #fff;
      padding: 30px;
      width: 300px;
      text-align: center;
      border: 2px solid #333;
    }

    .icon {
      width: 90px;
      height: 90px;
      border: 3px solid #333;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    label {
      display: block;
      text-align: left;
      margin: 10px 0 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #333;
      margin-bottom: 15px;
      outline: none;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      color: blue;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login">

    <div class="icon">
      <img src="imagen/icon.png" alt="usuario">
    </div>

    <label>Usuario</label>
    <input type="text">

    <label>Contraseña</label>
    <input type="password">

    <a href="#">No tengo una cuenta</a>

  </div>

</body>
</html>
